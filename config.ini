
;--------------------------------------------
; colors                                    ;
;--------------------------------------------

[colors]
background = #1a1b26
background-alt = #373B41
foreground = #c0caf5
primary = #bb9af7
secondary = #7aa2f7
alert = #f7768e
disabled = #666
transparent = #00000000


;--------------------------------------------
; bars                                      ;
;--------------------------------------------

[bar/second_bar]
    width = 100%
    height = 24pt
    radius = 5
    bottom = false
    fixed-center = true
    offset-x = 0%
    offset-y = 0%

    border-bottom-size = 0
	border-top-size = 10
	border-left-size = 10
	border-right-size = 10

    background = ${colors.background}
    foreground = ${colors.foreground}

    line-size = 2pt
    line-color = 

    border-size = 0pt
    border-color = #00000000

    padding-left = 1
    padding-right = 1

    module-margin = 1
;    module-margin-left = 1
;    module-margin-right = 1

;separator = :
;separator = 
    separator-foreground = ${colors.disabled}

    font-0 = Liga SFMono Nerd Font:size=12:antialias=true;2

    modules-left = battery memory cpu wlan
    modules-center = xwindow
    modules-right = pulseaudio eth date 


    enable-ipc = true

    tray-position = right
    tray-maxsize = 16
    tray-detached = false
    tray-offset-x = -2 
    tray-padding = 4
    tray-background = ${colors.background}
